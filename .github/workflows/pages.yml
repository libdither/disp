name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    # the site bundles the compiler (src/) and the whole library (lib/) into
    # the playground worker, so changes there redeploy too
    paths:
      - 'website/**'
      - 'lib/**'
      - 'src/**'
      - '.github/workflows/pages.yml'
  schedule:
    # weekly redeploy so the donation stats' 30-day window stays honest
    # between pushes (the stats refresh runs as part of the build)
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # dono-stats needs the commit count + first-commit date
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install
        working-directory: website
        run: npm ci
      # donation stats (GitHub Sponsors aggregates + XMR view-only scan);
      # SPONSORS_TOKEN is an optional user PAT for richer sponsor data —
      # without it the automatic token covers the public aggregates. Fails
      # SOFT: the committed snapshot stands and the deploy proceeds.
      - name: Refresh donation stats
        working-directory: website
        env:
          GITHUB_TOKEN: ${{ secrets.SPONSORS_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm run dono-stats || echo "stats refresh failed; committed snapshot stands"
      # the site lives at the custom domain root (disp-lang.net), so no base
      # path; github.io/disp URLs 301 there with the project prefix stripped
      - name: Build
        working-directory: website
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
