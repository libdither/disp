# The reducers (reduce/force/nf) recurse along the reduction spine; the default
# 1 MiB wasm shadow stack overflows on deep tree-calculus reductions (the kernel
# checker, recursive benchmarks). 64 MiB is generous headroom; an explicit-stack
# machine (no native recursion) is the later robustness upgrade if this is hit.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "link-arg=-zstack-size=268435456"]
