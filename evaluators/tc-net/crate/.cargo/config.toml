# The wasm shadow stack is COMMITTED up front (it's the [0, __heap_base) region of
# linear memory), so its size is the session's RSS floor. The hot paths — reduce,
# equal, dump_emit — are now iterative (explicit work-stacks on the heap), so the
# only native recursion left is shallow (parse on bounded input; test-only nf), and
# 16 MiB is ample headroom. Overflow, if ever hit, is a CATCHABLE wasm trap (the
# host recovers), not corruption. (Was 256 MiB back when `reduce` was recursive.)
[target.wasm32-unknown-unknown]
rustflags = ["-C", "link-arg=-zstack-size=16777216"]
