name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'test/**'
      - 'evaluators/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'lib/**'
      - 'test/**'
      - 'evaluators/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/test.yml'
  workflow_dispatch:
  schedule:
    # weekly full run with the incremental cache bypassed — catches cache-key
    # drift (a dependency the closure hash misses would otherwise hide)
    - cron: '43 5 * * 2'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Evaluator artifacts are gitignored; build them once and hand them to the
  # test jobs. Without rust_eager.node the suite falls back to the eager TS
  # oracle (far too slow for CI); the wasm/ic-net/lambada artifacts unlock
  # their differential-conformance test files (which skip when absent).
  build-evaluators:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            evaluators/rust-eager/crate
            evaluators/rust-ic-net/crate
      - name: Build rust-eager (native + wasm)
        run: |
          rustup target add wasm32-unknown-unknown
          ./evaluators/rust-eager/build-native.sh
          ./evaluators/rust-eager/build.sh
      - name: Build rust-ic-net (wasm)
        run: ./evaluators/rust-ic-net/build.sh
      - name: Build lambada (pinned upstream bundle)
        run: ./evaluators/lambada/build.sh
      # One artifact preserving evaluators/<name>/artifacts/ structure (paths
      # are stored relative to the least common ancestor, evaluators/).
      - uses: actions/upload-artifact@v4
        with:
          name: evaluator-artifacts
          path: evaluators/*/artifacts/
          retention-days: 1

  # Everything except the disp language suite: parser/tree/eval-backend
  # conformance, driver, guards, modules — plus the typecheck.
  unit:
    needs: build-evaluators
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: evaluator-artifacts
          path: evaluators/
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test -- --exclude 'test/disp.test.ts'

  # The disp language suite: ~80 lib/tests files run serially on one shared
  # session inside a single vitest file, so it shards round-robin across jobs
  # via DISP_TEST_SHARD (i/n, implemented in test/disp.test.ts). Each shard
  # pays its own kernel elaboration once, then runs its slice.
  disp-suite:
    needs: build-evaluators
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/3', '2/3', '3/3']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: evaluator-artifacts
          path: evaluators/
      # Incremental result cache (test/disp.test.ts): a lib file re-runs only
      # when its toolchain or transitive `use` closure changed. Keyed per shard;
      # the sha suffix makes every run save, restore-keys picks the latest.
      - uses: actions/cache@v4
        if: github.event_name != 'schedule'
        with:
          path: .disp-test-cache
          key: disp-test-cache-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            disp-test-cache-${{ matrix.shard }}-
      - name: Test (shard ${{ matrix.shard }})
        env:
          DISP_TEST_SHARD: ${{ matrix.shard }}
          DISP_TEST_CACHE: ${{ github.event_name == 'schedule' && '0' || '1' }}
        run: npm test -- test/disp.test.ts
